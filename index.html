<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ars Caelorum</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app">
    <main class="main">
      <div id="combatRibbon" class="combat-ribbon" aria-label="Combat initiative ribbon"></div>
      <div id="combatOverlay" class="combat-overlay" aria-label="Combat overlay"></div>

      <div class="stage">
        <svg id="board" viewBox="0 0 1400 900" aria-label="Isometric tactics board">
          <g id="world-scene"></g>
          <g id="world-ui"></g>
        </svg>
      </div>

      <section id="hudRoot" class="hud" aria-label="Tactical bottom HUD">
        <div id="hudLeft" class="hud-panel hud-panel-left"></div>
        <div id="hudCenter" class="hud-panel hud-panel-center"></div>
        <div id="hudRight" class="hud-panel hud-panel-right"></div>
      </section>
    </main>
  </div>

  <div id="editorDock" style="display:none;">
    <div id="editorShell" style="display:block;">
      <div class="panel-title">Map Editor</div>
      <div class="panel-sub">Left click = raise · Right click = lower</div>
      <div class="panel-sub">Base tile height only</div>
      <div class="panel-sub">R = Tactical View Toggle</div>

      <svg
        id="editor"
        viewBox="0 0 420 420"
        aria-label="Top down map editor"
      ></svg>
    </div>
  </div>

  <div id="devToolbar" class="toolbar">
    <button id="rotateLeft" type="button">⟲ Rotate Left</button>
    <button id="rotateRight" type="button">⟳ Rotate Right</button>
    <button id="toggleView" type="button">Toggle Tactical (R)</button>
    <button id="resetMap" type="button">Reset Map</button>
  </div>

  <script type="module" src="./script.js"></script>
</body>
</html>
