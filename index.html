<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ars Caelorum</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app">
    <div id="frontScreen" class="front-screen" aria-label="Front end screens">
      <section id="titleScreen" class="front-screen-view" aria-label="Title screen">
        <div class="front-screen-panel front-screen-panel-title">
          <video
            class="title-screen-video"
            autoplay
            muted
            loop
            playsinline
            poster="./art/menu/titleScreen.png"
            aria-hidden="true"
          >
            <source src="./art/menu/titleScreen.mp4" type="video/mp4" />
          </video>

          <audio id="titleThemeAudio" loop preload="auto">
            <source src="./art/menu/titleTheme.mp3" type="audio/mpeg" />
          </audio>

          <div class="front-screen-title-shade" aria-hidden="true"></div>

          <div class="front-screen-actions front-screen-title-actions" aria-label="Title menu">
            <button id="titleStartButton" type="button" class="front-screen-primary">Start Game</button>
            <button id="titleMissionSelectButton" type="button">Mission Select</button>
            <button
              id="titleAudioToggle"
              type="button"
              class="title-audio-toggle"
              aria-label="Mute title music"
              aria-pressed="false"
              title="Mute title music"
            >&#128266;</button>
          </div>
        </div>
      </section>

      <section id="missionSelectScreen" class="front-screen-view is-hidden" aria-label="Mission select screen">
        <div class="front-screen-panel front-screen-panel-select">
          <div class="front-screen-kicker">MISSION SELECT</div>
          <h2 class="front-screen-subtitle">Choose a mission</h2>
          <div class="front-screen-select-layout">
            <div id="missionList" class="front-screen-list" aria-label="Mission list"></div>
            <div class="front-screen-sidecard">
              <div id="missionDescription" class="front-screen-description"></div>
              <div class="front-screen-actions front-screen-actions-bottom">
                <button id="missionBackButton" type="button">Back</button>
                <button id="missionStartButton" type="button" class="front-screen-primary">Start Mission</button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section id="missionBriefingScreen" class="front-screen-view is-hidden" aria-label="Mission briefing screen">
        <div class="front-screen-panel front-screen-panel-select front-screen-panel-briefing">
          <div class="front-screen-kicker">MISSION BRIEFING</div>
          <h2 id="briefingTitle" class="front-screen-subtitle">Mission Briefing</h2>
          <div id="briefingMap" class="front-screen-card-text front-screen-briefing-map">MAP: unknown</div>
          <div id="briefingText" class="front-screen-briefing-text"></div>
          <div class="front-screen-card-title front-screen-briefing-objective-title">Objectives</div>
          <ul id="briefingObjectives" class="front-screen-objective-list"></ul>
          <div class="front-screen-actions front-screen-actions-bottom">
            <button id="briefingBackButton" type="button">Back</button>
            <button id="briefingStartButton" type="button" class="front-screen-primary">Launch Mission</button>
          </div>
        </div>
      </section>
    </div>

    <main id="mainRoot" class="main is-hidden">
      <div id="combatRibbon" class="combat-ribbon" aria-label="Combat initiative ribbon"></div>
      <div id="combatOverlay" class="combat-overlay" aria-label="Combat overlay"></div>

      <div class="stage">
        <svg id="board" viewBox="0 0 1400 900" aria-label="Isometric tactics board">
          <g id="world-scene"></g>
          <g id="world-ui"></g>
        </svg>
      </div>

      <section id="hudRoot" class="hud" aria-label="Tactical bottom HUD">
        <div id="hudLeft" class="hud-panel hud-panel-left"></div>
        <div id="hudCenter" class="hud-panel hud-panel-center"></div>
        <div id="hudRight" class="hud-panel hud-panel-right"></div>

        <aside
          id="helpDrawer"
          class="help-drawer"
          aria-label="Controls help drawer"
          aria-hidden="true"
        ></aside>
      </section>
    </main>
  </div>

  <div id="editorDock" style="display:none;">
    <div id="editorShell" style="display:block;">
      <div class="panel-title">Map Editor</div>
      <div class="panel-sub">Left click = raise · Right click = lower</div>
      <div class="panel-sub">Base tile height only</div>
      <div class="panel-sub">R = Tactical View Toggle</div>

      <svg
        id="editor"
        viewBox="0 0 420 420"
        aria-label="Top down map editor"
      ></svg>
    </div>
  </div>

  <div id="devToolbar" class="toolbar">
    <button id="rotateLeft" type="button">⟲ Rotate Left</button>
    <button id="rotateRight" type="button">⟳ Rotate Right</button>
    <button id="toggleView" type="button">Toggle Tactical (R)</button>
    <button id="resetMap" type="button">Reset Map</button>
  </div>

  <script type="module" src="./script.js"></script>
</body>
</html>
