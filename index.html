<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ars Caelorum</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app">
    <main class="main">
      <div id="devToolbar" class="toolbar">
        <button id="rotateLeft" type="button">⟲ Rotate Left</button>
        <button id="rotateRight" type="button">⟳ Rotate Right</button>
        <button id="toggleView" type="button">Toggle Tactical (R)</button>
        <button id="resetMap" type="button">Reset Map</button>
      </div>

      <div id="combatRibbon" class="combat-ribbon" aria-label="Combat initiative ribbon"></div>
      <div id="combatOverlay" class="combat-overlay" aria-label="Combat overlay"></div>

      <div class="stage">
        <svg id="board" viewBox="0 0 1400 900" aria-label="Isometric tactics board">
          <g id="world-scene"></g>
          <g id="world-ui"></g>
        </svg>
      </div>

      <section id="hudRoot" class="hud" aria-label="Tactical bottom HUD">
        <div id="hudLeft" class="hud-panel hud-panel-left"></div>
        <div id="hudCenter" class="hud-panel hud-panel-center"></div>
        <div id="hudRight" class="hud-panel hud-panel-right"></div>
      </section>
    </main>
  </div>

  <div
    id="ac-dev-root"
    style="
      position: fixed;
      top: 0;
      right: 0;
      width: min(760px, 92vw);
      height: 100vh;
      z-index: 9999;
      display: none;
      pointer-events: none;
    "
  >
    <div
      id="ac-dev-panel"
      style="
        display: none;
        width: 100%;
        height: 100%;
        background: rgba(10, 12, 18, 0.96);
        color: #d8e1ea;
        border-left: 1px solid rgba(255,255,255,0.12);
        box-shadow: -8px 0 24px rgba(0,0,0,0.35);
        font-family: monospace;
        font-size: 12px;
        pointer-events: auto;
        box-sizing: border-box;
        overflow: hidden;
      "
    >
      <div style="display:flex; justify-content:space-between; align-items:center; padding:12px 12px 0 12px;">
        <div style="font-size:14px; font-weight:bold;">DEV MENU</div>
        <button id="ac-dev-close-btn" type="button">Close</button>
      </div>

      <div style="display:flex; gap:8px; padding:12px 12px 0 12px;">
        <button id="ac-dev-tab-units" type="button">Units</button>
        <button id="ac-dev-tab-map" type="button">Map</button>
      </div>

      <div style="display:grid; grid-template-columns: minmax(0, 1fr); height: calc(100% - 92px); padding:12px; gap:12px;">
        <div id="ac-dev-tab-panel-units" style="display:block; overflow-y:auto; min-height:0;"></div>

        <div id="ac-dev-tab-panel-map" style="display:none; overflow-y:auto; min-height:0;">
          <aside class="sidebar" style="width:100%; min-width:0; height:auto; border-right:0; padding:0; background:transparent;">
            <div class="panel-title">Ars Caelorum</div>
            <div class="panel-sub">Map Editor</div>
            <div class="panel-sub">Left click = raise · Right click = lower</div>
            <div class="panel-sub">1 mech tile = 4×4 detail cells</div>
            <div class="panel-sub">R = Tactical View Toggle</div>

            <div style="display:flex; gap:8px; margin:10px 0 8px;">
              <button id="editorModeMech" type="button">Mech Tile Edit</button>
              <button id="editorModeDetail" type="button">Detail Cell Edit</button>
            </div>

            <div id="editorModeLabel" class="panel-sub">Editor Mode: Mech Tiles</div>

            <svg
              id="editor"
              viewBox="0 0 420 420"
              aria-label="Top down mech map editor"
            ></svg>
          </aside>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="./script.js"></script>
</body>
</html>
